    <title>FastQA — Automatiza tus pruebas, potencia tu software</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('fastqa-theme')
          var dark =
            stored === 'dark' ||
            (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (_) {}
      })()
    </script>
